services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: lab
      POSTGRES_USER: usrnmeee
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "usrnmeee"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7.0-bullseye

  airflow-webserver:
    image: apache/airflow:2.10.0
    depends_on:
      - postgres
      - redis
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://usrnmeee:password@postgres/lab
      AIRFLOW__WEBSERVER__SECRET_KEY: "a4f91f8b7d214a0c9d92a0f0d9d2bb11"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/airflow/app
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.0
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://usrnmeee:password@postgres/lab
      AIRFLOW__WEBSERVER__SECRET_KEY: "a4f91f8b7d214a0c9d92a0f0d9d2bb11"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/app
    command: scheduler

  airflow-worker:
    image: apache/airflow:2.10.0
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://usrnmeee:password@postgres/lab
      AIRFLOW__WEBSERVER__SECRET_KEY: "a4f91f8b7d214a0c9d92a0f0d9d2bb11"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/app
    command: celery worker

  airflow-init:
    image: apache/airflow:2.10.0
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://usrnmeee:password@postgres/lab
      AIRFLOW__WEBSERVER__SECRET_KEY: "a4f91f8b7d214a0c9d92a0f0d9d2bb11"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/app
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
          airflow users create -u airflow -p airflow -r Admin -e admin@example.com -f Admin -l Admin"
  

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

volumes:
  pgdata: